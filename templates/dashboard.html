<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>

    <header class="d-flex justify-content-between align-items-center p-3 bg-light">
      <h1>Welcome {{ user }}</h1>
      <a href="/logout" class="btn btn-danger">Logout</a>
    </header>

    <hr>

    <div class="container-fluid">
      <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 bg-dark text-white p-3 min-vh-100">
          <h4>Menu</h4>
          <ul class="nav flex-column">
             <li class="nav-item">
               <a class="nav-link text-white" href="/dashboard">Dashboard</a>
             </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="/notifications">Notifications</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="/post">Upload Idea</a>
            </li>
          </ul>
        </nav>

        
        <main class="col-md-9 col-lg-10 p-4">
  <h3 class="mt-4">All Ideas 💡</h3>

{% for idea in ideas %}
  <div class="card mb-3 p-3 shadow-sm">
    <h5>{{ idea[0] }}</h5>
    <p>{{ idea[1] }}</p>
    <small class="text-muted">Posted by {{ idea[2] }}</small>
  </div>
{% endfor %}
</main>
      </div>
    </div>

  </body>
</html>
