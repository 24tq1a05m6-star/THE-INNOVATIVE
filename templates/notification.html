<!DOCTYPE html>
<html>
<head>
  <title>Notifications</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <!-- Form Card -->
  <div class="card p-4 shadow">
    <h2 class="text-center mb-4">Notifications 🔔</h2>

    <form method="POST">
      
      <div class="mb-3">
        <input type="text" name="title" class="form-control" placeholder="Notification Title" required>
      </div>

      <div class="mb-3">
        <textarea name="message" class="form-control" placeholder="Write notification..." rows="3" required></textarea>
      </div>

      <div class="mb-3">
        <input type="url" name="image" class="form-control" placeholder="Image URL (optional)">
      </div>

      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-primary">Add Notification</button>
        <a href="/dashboard" class="btn btn-secondary">Back</a>
      </div>

    </form>
  </div>

  <!-- Notifications List -->
  <div class="mt-4">

    {% if notes %}
      {% for note in notes %}
        <div class="card mb-3 p-3 shadow-sm">
          <h5>{{ note.title }}</h5>
          <p>{{ note.message }}</p>

          {% if note.image %}
            <img src="{{ note.image }}" class="img-fluid mt-2 rounded" alt="Notification Image">
          {% endif %}
        </div>
      {% endfor %}
    {% else %}
      <div class="alert alert-info text-center">
        No notifications yet 📭
      </div>
    {% endif %}

  </div>

</div>

</body>
</html>
